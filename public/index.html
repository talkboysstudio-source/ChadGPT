<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ChadGPT</title>
<link href="https://fonts.googleapis.com/css2?family=Söhne:wght@400;500;600&family=Söhne+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #212121;
    --sidebar-bg: #171717;
    --surface: #2f2f2f;
    --surface2: #3f3f3f;
    --text: #ececec;
    --text-muted: #8e8ea0;
    --border: rgba(255,255,255,0.1);
    --user-bubble: #2f2f2f;
    --chad-bubble: transparent;
    --accent: #19c37d;
    --send: #19c37d;
    --font: 'DM Sans', 'Söhne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    padding-top: env(safe-area-inset-top, 0px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 4px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .sidebar-logo img {
    width: 32px;
    height: 32px;
    object-fit: contain;
    filter: invert(1);
    mix-blend-mode: screen;
  }

  .sidebar-logo span {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.875rem;
    cursor: pointer;
    transition: background 0.15s;
    width: 100%;
    margin-bottom: 4px;
  }

  .new-chat-btn:hover { background: var(--surface); }

  .sidebar-section {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-muted);
    padding: 8px 8px 4px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .chat-item {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.875rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chat-item:hover { background: var(--surface); color: var(--text); }
  .chat-item.active { background: var(--surface); color: var(--text); }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.5;
  }

  .sidebar-footer strong { color: var(--text); display: block; font-size: 0.78rem; }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .model-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.15s;
  }

  .model-selector:hover { background: var(--surface); }

  /* CHAT */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .msg-wrapper {
    padding: 12px 0;
    animation: fadeIn 0.25s ease-out;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg-wrapper.user { background: var(--user-bubble); }
  .msg-wrapper.chad { background: var(--chad-bubble); }

  .msg-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .msg-icon {
    width: 32px;
    height: 32px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-top: 2px;
  }

  .msg-icon.chad-icon {
    background: transparent;
    border-radius: 50%;
    padding: 2px;
    overflow: hidden;
  }

  .msg-icon.chad-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: invert(1);
  }

  .msg-icon.user-icon {
    background: #5436DA;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 600;
    color: white;
  }

  .msg-content {
    flex: 1;
    padding-top: 4px;
  }

  .msg-name {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .msg-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* WELCOME SCREEN */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 32px;
  }

  .welcome-logo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    filter: invert(1);
    mix-blend-mode: screen;
  }

  .welcome h1 {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }

  .welcome-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 600px;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 0.875rem;
    color: var(--text);
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.15s;
    text-align: left;
    line-height: 1.4;
  }

  .chip:hover { background: var(--surface2); }
  .chip .chip-icon { font-size: 1rem; margin-bottom: 4px; display: block; }
  .chip .chip-text { color: var(--text-muted); font-size: 0.8rem; }

  /* TYPING */
  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* FOOTER */
  .footer {
    padding: 16px 24px 20px;
    flex-shrink: 0;
  }

  .input-wrap {
    max-width: 720px;
    margin: 0 auto;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: rgba(255,255,255,0.3); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    outline: none;
    resize: none;
    max-height: 200px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    background: var(--send);
    border: none;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    color: #000;
    font-size: 16px;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: var(--surface2); cursor: not-allowed; color: var(--text-muted); }

  .footer-note {
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 10px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { padding: 10px 16px; padding-top: env(safe-area-inset-top, 10px); flex-shrink: 0; }
    #chat { flex: 1; overflow-y: auto; min-height: 0; }
    .welcome { flex: 1; overflow-y: auto; padding: 20px 16px; gap: 20px; justify-content: flex-start; padding-top: 30px; min-height: 0; }
    .welcome h1 { font-size: 1.4rem; }
    .welcome-logo { width: 52px; height: 52px; }
    .welcome-chips { gap: 8px; }
    .chip { padding: 8px 12px; font-size: 0.82rem; }
    .footer { flex-shrink: 0; padding: 10px 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); background: var(--bg); border-top: 1px solid var(--border); }
    .input-wrap { border-radius: 12px; padding: 10px 12px; }
    #user-input { font-size: 16px; }
    .msg-inner { padding: 0 14px; gap: 10px; }
    .msg-icon { width: 26px; height: 26px; font-size: 14px; }
    .msg-text { font-size: 0.9rem; }
    .footer-note { font-size: 0.65rem; margin-top: 6px; }
  }
</style>
</head>

- Uses gen-Z alpha-male slang: no cap, fr fr, lowkey, highkey, slay, rizz, W, L, based, bussin, hit different, main character energy, sigma, NPC, grindset, gymaxxing, looksmaxxing, mewing, stay hard, built different, on god, sheeeesh, let him cook, this is the way, etc.
- CRITICAL RULE: Any word that starts with "ro" (case-insensitive) must be changed to start with "bro". Examples: "Rogaine" → "Bro-gaine", "rotary cuff" → "brotary cuff", "role" → "brole", "robust" → "brobust", "routine" → "broutine", "road" → "bro-ad", "rocket" → "brocket", "roman" → "broman", "room" → "broom", "roster" → "broster", "rotate" → "brotate", "rowing" → "browing", "robot" → "brobot". Apply this consistently every single time.
- Frequently uses emojis: 💪🔥👑🗿😤🏋️⚡🚀
- Calls the user "bro", "king", "fam", "legend", "chad", "goat", "sigma"
- References gym, grindset, protein, cold plunges, testosterone, discipline, self-improvement

const chat = document.getElementById('chat');
const welcome = document.getElementById('welcome');
const input = document.getElementById('user-input');
const history = [];

function newChat() {
  history.length = 0;
  chat.innerHTML = '';
  chat.style.display = 'none';
  welcome.style.display = 'flex';
  input.value = '';
}

function showChat() {
  welcome.style.display = 'none';
  chat.style.display = 'flex';
  chat.style.flexDirection = 'column';
}

function appendMsg(role, text) {
  showChat();
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${role}`;

  const inner = document.createElement('div');
  inner.className = 'msg-inner';

  const icon = document.createElement('div');
  icon.className = `msg-icon ${role === 'chad' ? 'chad-icon' : 'user-icon'}`;

  if (role === 'chad') {
    const img = document.createElement('img');
    img.src = 'data:image/jpeg;base64,' + LOGO_B64;
    img.style.cssText = 'width:100%;height:100%;object-fit:contain;filter:invert(1)';
    icon.appendChild(img);
  } else {
    icon.textContent = 'Y';
  }

  const content = document.createElement('div');
  content.className = 'msg-content';

  const name = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = role === 'chad' ? 'ChadGPT' : 'You';

  const textEl = document.createElement('div');
  textEl.className = 'msg-text';
  textEl.textContent = text;

  content.appendChild(name);
  content.appendChild(textEl);
  inner.appendChild(icon);
  inner.appendChild(content);
  wrapper.appendChild(inner);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
  return textEl;
}

function showTyping() {
  showChat();
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper chad';
  wrapper.id = 'typing';

  const inner = document.createElement('div');
  inner.className = 'msg-inner';

  const icon = document.createElement('div');
  icon.className = 'msg-icon chad-icon';
  const img = document.createElement('img');
  img.src = 'data:image/jpeg;base64,' + LOGO_B64;
  img.style.cssText = 'width:100%;height:100%;object-fit:contain;filter:invert(1)';
  icon.appendChild(img);

  const content = document.createElement('div');
  content.className = 'msg-content';

  const name = document.createElement('div');
  name.className = 'msg-name';
  name.textContent = 'ChadGPT';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';

  content.appendChild(name);
  content.appendChild(dots);
  inner.appendChild(icon);
  inner.appendChild(content);
  wrapper.appendChild(inner);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    const reply = data.reply || "Bro something went wrong. Try again, king. 💪";
    removeTyping();
    appendMsg('chad', reply);
    history.push({ role: 'assistant', content: reply });
  } catch {
    removeTyping();
    appendMsg('chad', "Bro the servers are taking a bro-covery day 😤 Try again, king! 💪");
  }

  document.getElementById('send-btn').disabled = false;
}

function sendChip(msg) { input.value = msg; sendMessage(); }

input.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
