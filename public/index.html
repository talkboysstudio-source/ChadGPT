<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChadGPT 💪</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700; --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a;
    --text: #f0f0f0; --muted: #888; --chad-bubble: #1a1500; --user-bubble: #001a2e; --accent: #FF6B00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(255,107,0,0.04) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  header { background: linear-gradient(135deg, #111 0%, #1a1400 100%); border-bottom: 2px solid var(--gold); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: relative; z-index: 10; box-shadow: 0 4px 30px rgba(255,215,0,0.15); }
  .chad-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; animation: pulse-glow 3s ease-in-out infinite; }
  @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 35px rgba(255,215,0,0.7); } }
  .header-text h1 { font-family: 'Black Han Sans', Impact, sans-serif; font-size: 1.8rem; letter-spacing: 3px; background: linear-gradient(90deg, var(--gold), var(--accent), var(--gold)); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 3s linear infinite; }
  @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
  .header-text p { font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
  .status-badge { margin-left: auto; background: rgba(255,215,0,0.1); border: 1px solid var(--gold); border-radius: 20px; padding: 4px 14px; font-size: 0.72rem; color: var(--gold); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; background: #00ff88; border-radius: 50%; animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #chat { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
  .msg { display: flex; gap: 12px; max-width: 800px; animation: fadeSlideIn 0.35s ease-out; }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.chad { align-self: flex-start; }
  .msg-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; margin-top: 20px; }
  .msg.chad .msg-avatar { background: linear-gradient(135deg, var(--gold), var(--accent)); box-shadow: 0 0 12px rgba(255,215,0,0.35); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, #0066cc, #004a99); }
  .bubble-wrap { display: flex; flex-direction: column; }
  .msg.user .bubble-wrap { align-items: flex-end; }
  .msg-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .msg.chad .msg-label { color: var(--gold); }
  .msg.user .msg-label { color: #4da6ff; }
  .bubble { padding: 14px 18px; border-radius: 18px; line-height: 1.65; font-size: 0.95rem; max-width: calc(100% - 10px); white-space: pre-wrap; }
  .msg.chad .bubble { background: var(--chad-bubble); border: 1px solid rgba(255,215,0,0.2); border-top-left-radius: 4px; color: #f0e8d0; }
  .msg.user .bubble { background: var(--user-bubble); border: 1px solid rgba(0,120,255,0.2); border-top-right-radius: 4px; color: #d0e8ff; }
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
  .typing-indicator span { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: typing-bounce 1.2s ease-in-out infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }
  footer { background: var(--surface); border-top: 1px solid rgba(255,215,0,0.2); padding: 14px 16px; position: relative; z-index: 10; }
  .input-row { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }
  #user-input { flex: 1; background: var(--surface2); border: 1.5px solid rgba(255,215,0,0.25); border-radius: 14px; padding: 13px 18px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; resize: none; }
  #user-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.1); }
  #user-input::placeholder { color: var(--muted); }
  #send-btn { background: linear-gradient(135deg, var(--gold), var(--accent)); border: none; border-radius: 14px; width: 54px; height: 54px; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0; box-shadow: 0 4px 15px rgba(255,215,0,0.3); }
  #send-btn:hover { transform: scale(1.07); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .disclaimer { text-align: center; font-size: 0.68rem; color: var(--muted); margin-top: 8px; }
  .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; max-width: 820px; margin: 0 auto 12px; }
  .chip { background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.25); border-radius: 20px; padding: 6px 14px; font-size: 0.78rem; color: var(--gold); cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 600; transition: background 0.2s; }
  .chip:hover { background: rgba(255,215,0,0.18); }
  .powered-by { font-size: 0.65rem; color: #444; text-align: right; margin-top: 4px; max-width: 820px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>
<header>
  <div class="chad-avatar">💪</div>
  <div class="header-text">
    <h1>CHADGPT</h1>
    <p>Alpha Intelligence &bull; No Cap Edition</p>
  </div>
  <div class="status-badge">
    <span class="status-dot"></span>
    Gigachad Mode
  </div>
</header>

<div id="chat"></div>

<footer>
  <div class="welcome-chips" id="chips">
    <button class="chip" onclick="sendChip('How do I get jacked?')">💪 How do I get jacked?</button>
    <button class="chip" onclick="sendChip('How do I develop a sigma mindset?')">🧠 Sigma mindset</button>
    <button class="chip" onclick="sendChip('How do I become a bro-llionaire?')">💼 Get rich</button>
    <button class="chip" onclick="sendChip('Give me alpha male dating advice')">❤️ Dating tips</button>
  </div>
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask ChadGPT anything, bro... 💪"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="disclaimer">ChadGPT is a parody AI. All advice is satirical and for entertainment only. Stay hydrated, king. 👑</div>
  <div class="powered-by">Powered by Groq ⚡</div>
</footer>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('user-input');
  const history = [];

  window.addEventListener('load', () => {
    appendMsg('chad', "YO what is UP bro! 🔥 I'm ChadGPT — the most SIGMA AI on the planet, no cap. My broutine is simple: help you become the most based, high-value version of yourself. Whether it's gymaxxing, mindset, rizz, or career grindset — I GOT YOU, king. 💪 What we workin on today? 👑");
  });

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'chad' ? '💪' : '🫵';
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'chad' ? 'ChadGPT' : 'You';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    div.appendChild(avatar);
    div.appendChild(wrap);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg chad';
    div.id = 'typing';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '💪';
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'ChadGPT';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    div.appendChild(avatar);
    div.appendChild(wrap);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    document.getElementById('chips').style.display = 'none';
    input.value = '';
    input.style.height = 'auto';
    appendMsg('user', text);
    history.push({ role: 'user', content: text });
    showTyping();
    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      const reply = data.reply || "Bro something went wrong. Try again, king. 💪";
      removeTyping();
      appendMsg('chad', reply);
      history.push({ role: 'assistant', content: reply });
    } catch {
      removeTyping();
      appendMsg('chad', "Bro the servers are taking a bro-covery day 😤 Try again, king! 💪");
    }

    document.getElementById('send-btn').disabled = false;
  }

  function sendChip(msg) { input.value = msg; sendMessage(); }

  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
